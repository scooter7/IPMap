<style>

  #search:focus { outline: none; border-color: #58a6ff; }
  .table-wrap { overflow-y: auto; flex: 1; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { position: sticky; top: 0; background: #21262d; padding: 8px 10px; text-align: left; color: #8b949e; font-weight: 600; border-bottom: 1px solid #30363d; cursor: pointer; user-select: none; }
  thead th:hover { color: #f0f6fc; }
  thead th.sorted { color: #58a6ff; }
  tbody tr { border-bottom: 1px solid #21262d; cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: #21262d; }
  tbody tr.active { background: #1c2a3e; }
  td { padding: 7px 10px; vertical-align: middle; }
  td.ip { font-family: 'Courier New', monospace; color: #79c0ff; }
  td.clicks { font-weight: 700; color: #56d364; text-align: right; }
  td.loc { color: #8b949e; font-size: 11px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-block; background: #388bfd22; color: #58a6ff; border: 1px solid #388bfd44; border-radius: 10px; padding: 1px 7px; font-size: 10px; }
  .popup-ip { font-family: monospace; font-size: 13px; font-weight: 700; color: #79c0ff; }
  .popup-detail { font-size: 12px; color: #555; margin-top: 2px; }
  .popup-clicks { font-size: 13px; font-weight: 700; color: #2ea043; margin-top: 4px; }
  .popup-campaigns { font-size: 11px; color: #666; margin-top: 4px; max-width: 240px; }

// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([37, -20], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

// Cluster group
const markers = L.markerClusterGroup({
  maxClusterRadius: 50,
  showCoverageOnHover: false,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();
    const size = count < 10 ? 36 : count < 50 ? 44 : 52;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;background:#388bfd;border:2px solid #58a6ff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;">${count}</div>`,
      className: '',
      iconSize: [size, size]
    });
  }
});

const markerMap = {};

DATA.forEach(d => {
  const radius = Math.max(8, Math.min(24, 8 + d.clicks * 3));
  const marker = L.circleMarker([d.lat, d.lon], {
    radius,
    fillColor: '#58a6ff',
    color: '#388bfd',
    weight: 1.5,
    opacity: 0.9,
    fillOpacity: 0.7
  });

  const loc = [d.city, d.region, d.country].filter(Boolean).join(', ');
  const campaigns = d.campaigns.length
    ? `<div class="popup-campaigns"><b>Campaigns:</b> ${d.campaigns.slice(0,3).join('<br>')}</div>`
    : '';

  marker.bindPopup(`
    <div class="popup-ip">${d.ip}</div>
    <div class="popup-detail">${loc || 'Unknown location'}</div>
    ${d.isp ? `<div class="popup-detail">ISP: ${d.isp}</div>` : ''}
    <div class="popup-clicks">&#128432; ${d.clicks} click${d.clicks !== 1 ? 's' : ''}</div>
    ${campaigns}
  `, { maxWidth: 280 });

  markers.addLayer(marker);
  markerMap[d.ip] = marker;
});

map.addLayer(markers);

// ── Table ──────────────────────────────────────────────────────────────────
let currentData = [...TABLE_DATA];
let sortCol = 'clicks';
let sortAsc = false;
let activeIp = null;

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(d => {
    const loc = [d.city, d.region, d.country].filter(Boolean).join(', ') || '—';
    const tr = document.createElement('tr');
    if (d.ip === activeIp) tr.classList.add('active');
    tr.innerHTML = `
      <td class="ip">${d.ip}</td>
      <td class="loc" title="${loc}">${loc}</td>
      <td class="clicks"><span class="badge">${d.clicks}</span></td>
    `;
    tr.addEventListener('click', () => {
      activeIp = d.ip;
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('active'));
      tr.classList.add('active');
      const marker = markerMap[d.ip];
      if (marker) {
        // Zoom to marker
        map.setView([d.lat, d.lon], 10, {animate: true});
        // Open popup on the actual marker (may be in cluster)
        markers.zoomToShowLayer(marker, () => marker.openPopup());
      }
    });
    tbody.appendChild(tr);
  });
}

function sortAndRender() {
  currentData.sort((a, b) => {
    let av, bv;
    if (sortCol === 'clicks') { av = a.clicks; bv = b.clicks; }
    else if (sortCol === 'ip') { av = a.ip; bv = b.ip; }
    else { av = [a.city, a.region, a.country].join(','); bv = [b.city, b.region, b.country].join(','); }
    return sortAsc
      ? (av > bv ? 1 : av < bv ? -1 : 0)
      : (av < bv ? 1 : av > bv ? -1 : 0);
  });
  renderTable(currentData);
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = col !== 'clicks'; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.textContent = th.textContent.replace(/[▲▼ ]/g, '').trim() +
      ' ' + (sortAsc ? '▲' : '▼');
    sortAndRender();
  });
});

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  currentData = q
    ? TABLE_DATA.filter(d =>
        d.ip.includes(q) ||
        (d.city || '').toLowerCase().includes(q) ||
        (d.country || '').toLowerCase().includes(q) ||
        (d.region || '').toLowerCase().includes(q) ||
        (d.isp || '').toLowerCase().includes(q))
    : [...TABLE_DATA];
  sortAndRender();
});

sortAndRender();
</script>
