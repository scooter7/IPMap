// ── Map setup ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([37, -20], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19
}).addTo(map);

// Cluster group
const markers = L.markerClusterGroup({
  maxClusterRadius: 50,
  showCoverageOnHover: false,
  iconCreateFunction: function(cluster) {
    const count = cluster.getChildCount();
    const size = count < 10 ? 36 : count < 50 ? 44 : 52;
    return L.divIcon({
      html: `<div style="width:${size}px;height:${size}px;background:#388bfd;border:2px solid #58a6ff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;">${count}</div>`,
      className: '',
      iconSize: [size, size]
    });
  }
});

const markerMap = {};

DATA.forEach(d => {
  const radius = Math.max(8, Math.min(24, 8 + d.clicks * 3));
  const marker = L.circleMarker([d.lat, d.lon], {
    radius,
    fillColor: '#58a6ff',
    color: '#388bfd',
    weight: 1.5,
    opacity: 0.9,
    fillOpacity: 0.7
  });

  const loc = [d.city, d.region, d.country].filter(Boolean).join(', ');
  const orgStr = d.org ? d.org.replace(/^AS\d+\s+/, '') : '';
  const campaigns = d.campaigns.length
    ? `<div class="popup-campaigns"><b>Campaigns:</b> ${d.campaigns.slice(0,3).join('<br>')}</div>`
    : '';

  marker.bindPopup(`
    <div class="popup-ip">${d.ip}</div>
    ${orgStr ? `<div class="popup-org">${orgStr}</div>` : ''}
    <div class="popup-detail">${loc || 'Unknown location'}</div>
    <div class="popup-clicks">&#128432; ${d.clicks} click${d.clicks !== 1 ? 's' : ''}</div>
    ${campaigns}
  `, { maxWidth: 280 });

  markers.addLayer(marker);
  markerMap[d.ip] = marker;
});

map.addLayer(markers);

// ── Table ──────────────────────────────────────────────────────────────────
let currentData = [...TABLE_DATA];
let sortCol = 'clicks';
let sortAsc = false;
let activeIp = null;

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(d => {
    const loc = [d.city, d.region, d.country].filter(Boolean).join(', ') || '—';
    const orgDisplay = d.org ? d.org.replace(/^AS\d+\s+/, '') : '—';
    const tr = document.createElement('tr');
    if (d.ip === activeIp) tr.classList.add('active');
    tr.innerHTML = `
      <td class="ip">${d.ip}</td>
      <td class="org" title="${d.org || ''}">${orgDisplay}</td>
      <td class="loc" title="${loc}">${loc}</td>
      <td class="clicks"><span class="badge">${d.clicks}</span></td>
    `;
    tr.addEventListener('click', () => {
      activeIp = d.ip;
      document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('active'));
      tr.classList.add('active');
      const marker = markerMap[d.ip];
      if (marker) {
        map.setView([d.lat, d.lon], 10, {animate: true});
        markers.zoomToShowLayer(marker, () => marker.openPopup());
      }
    });
    tbody.appendChild(tr);
  });
}

function sortAndRender() {
  currentData.sort((a, b) => {
    let av, bv;
    if (sortCol === 'clicks') { av = a.clicks; bv = b.clicks; }
    else if (sortCol === 'ip') { av = a.ip; bv = b.ip; }
    else if (sortCol === 'org') { av = a.org || ''; bv = b.org || ''; }
    else { av = [a.city, a.region, a.country].join(','); bv = [b.city, b.region, b.country].join(','); }
    return sortAsc
      ? (av > bv ? 1 : av < bv ? -1 : 0)
      : (av < bv ? 1 : av > bv ? -1 : 0);
  });
  renderTable(currentData);
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = col !== 'clicks'; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.textContent = th.textContent.replace(/[▲▼ ]/g, '').trim() +
      ' ' + (sortAsc ? '▲' : '▼');
    sortAndRender();
  });
});

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  currentData = q
    ? TABLE_DATA.filter(d =>
        d.ip.includes(q) ||
        (d.org || '').toLowerCase().includes(q) ||
        (d.city || '').toLowerCase().includes(q) ||
        (d.country || '').toLowerCase().includes(q) ||
        (d.region || '').toLowerCase().includes(q))
    : [...TABLE_DATA];
  sortAndRender();
});

sortAndRender();
</script>
